<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- Customize gallery metadata in data.json. -->
    <title>Agent &lt;Pages/&gt;</title>
    <meta name="description" content="agent-pages gallery." />
    <link rel="icon" href="data:," />
    <style>
      :root {
        --bg: #fbfbfd;
        --bg-chrome: #f5f5f7;
        --surface: #ffffff;
        --text: #1d1d1f;
        --text-2: #565659;
        --text-3: #86868b;
        --rule: #e6e6eb;
        --rule-soft: #e8e8ed;
        --accent: #2563eb;
        --accent-soft: #eaf1ff;
        --max-w: 1040px;
        --space-1: 8px;
        --space-2: 16px;
        --space-3: 24px;
        --space-4: 40px;
        --space-5: 64px;
        --nav-h: 52px;
        --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei", Roboto, Helvetica, Arial,
          sans-serif;
        --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #000000;
          --bg-chrome: #0d0d0f;
          --surface: #0d0d0f;
          --text: #f5f5f7;
          --text-2: #c7c7cc;
          --text-3: #8a8a8f;
          --rule: #1f1f24;
          --rule-soft: #1a1a1f;
          --accent: #5b8cff;
          --accent-soft: #10203d;
        }
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
        font-size: 17px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
      }
      a { color: inherit; text-decoration: none; }
      .wrap { width: 100%; max-width: var(--max-w); margin: 0 auto; padding: 0 var(--space-3); }

      nav.global {
        position: sticky;
        top: 0;
        z-index: 100;
        height: var(--nav-h);
        background: color-mix(in srgb, var(--bg-chrome), transparent 18%);
        backdrop-filter: saturate(180%) blur(20px);
        -webkit-backdrop-filter: saturate(180%) blur(20px);
        border-bottom: 1px solid var(--rule-soft);
      }
      nav.global .inner {
        width: 100%;
        max-width: var(--max-w);
        height: 100%;
        margin: 0 auto;
        padding: 0 var(--space-3);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--space-2);
      }
      nav.global .brand {
        color: var(--text);
        font-size: 17px;
        font-weight: 500;
        letter-spacing: -0.022em;
        line-height: 1;
      }
      .brand {
        display: inline-flex;
        align-items: baseline;
        flex-wrap: nowrap;
        gap: 6px;
      }
      .brand .sep {
        color: var(--text-3);
        font-weight: 400;
        margin: 0 2px;
      }
      .brand .html {
        font-family: var(--mono);
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0;
        background: linear-gradient(
          92deg,
          #ff6a3d 0%,
          #ff2d55 28%,
          #af52de 58%,
          #007aff 100%
        );
        background-size: 200% 100%;
        background-position: 0% 50%;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .brand .html .bracket {
        color: var(--text-3);
        -webkit-text-fill-color: var(--text-3);
        font-weight: 400;
      }
      nav.global .gh {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex: none;
        color: var(--text-2);
        line-height: 0;
        padding: 6px;
        margin-right: -6px;
        transition: color 0.15s ease;
      }
      nav.global .gh[hidden] { display: none; }
      nav.global .gh:hover { color: var(--text); }
      nav.global .gh svg { display: block; width: 20px; height: 20px; }

      main.gallery { flex: 1; padding: var(--space-4) 0 var(--space-5); }
      .gallery-layout {
        display: grid;
        grid-template-columns: 188px minmax(0, 1fr);
        gap: var(--space-4);
        align-items: start;
      }

      .filters {
        position: sticky;
        top: calc(var(--nav-h) + var(--space-3));
        padding-right: var(--space-2);
      }
      .filter-section + .filter-section {
        margin-top: var(--space-3);
      }
      .filters h2 {
        margin: 0 0 10px;
        color: var(--text-3);
        font-size: 12px;
        font-weight: 650;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .category-list {
        display: grid;
        gap: 4px;
      }
      .category-button {
        min-width: 0;
        width: 100%;
        min-height: 30px;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: var(--text-2);
        cursor: pointer;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 8px;
        padding: 4px 6px;
        font: inherit;
        font-size: 12px;
        line-height: 1.35;
        text-align: left;
      }
      .category-button:hover {
        background: var(--surface);
        color: var(--text);
      }
      .category-button[aria-pressed="true"] {
        background: var(--accent-soft);
        color: var(--accent);
      }
      .category-name {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .category-count {
        color: var(--text-3);
        font-family: var(--mono);
        font-size: 11px;
        font-variant-numeric: tabular-nums;
      }
      .tag-list {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .tag-button {
        min-width: 0;
        max-width: 100%;
        min-height: 28px;
        border: 1px solid var(--rule);
        border-radius: 999px;
        background: transparent;
        color: var(--text-2);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 3px 8px;
        font: inherit;
        font-size: 12px;
        line-height: 1.35;
        text-align: center;
        transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
      }
      .tag-button:hover {
        background: var(--surface);
        border-color: var(--rule);
        color: var(--text);
      }
      .tag-button[aria-pressed="true"] {
        background: var(--accent-soft);
        border-color: color-mix(in srgb, var(--accent), transparent 68%);
        color: var(--accent);
      }
      .tag-name {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .tag-count {
        flex: none;
        color: var(--text-3);
        font-family: var(--mono);
        font-size: 11px;
        font-variant-numeric: tabular-nums;
      }
      /* mobile filter drawer — inert on desktop */
      .filter-trigger { display: none; }
      .drawer-head { display: none; }
      .drawer-backdrop { display: none; }

      .gallery-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: var(--space-2);
        min-height: 28px;
      }
      .gallery-head h2 {
        margin: 0;
        font-size: 15px;
        font-weight: 600;
        color: var(--text-2);
      }
      .gallery-count {
        color: var(--text-3);
        font-family: var(--mono);
        font-size: 12px;
        font-variant-numeric: tabular-nums;
      }

      section.year {
        display: flex;
        align-items: baseline;
        gap: var(--space-2);
        margin: var(--space-4) 0 var(--space-2);
      }
      section.year:first-of-type { margin-top: var(--space-3); }
      section.year h3 {
        margin: 0;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.04em;
        color: var(--text-3);
        font-variant-numeric: tabular-nums;
      }
      section.year .rule { flex: 1; height: 1px; background: var(--rule); }

      ul.list { list-style: none; margin: 0; padding: 0; }
      ul.list li { border-bottom: 1px solid var(--rule); }
      ul.list a {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: baseline;
        gap: var(--space-3);
        padding: var(--space-2) 0;
        min-height: 44px;
        transition: color 0.15s ease;
      }
      ul.list a:hover { color: var(--accent); }
      ul.list .title {
        min-width: 0;
        font-size: 17px;
        font-weight: 450;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      ul.list .date {
        flex: none;
        color: var(--text-3);
        font-family: var(--mono);
        font-size: 13px;
        font-variant-numeric: tabular-nums;
      }
      .entry-tags {
        grid-column: 1 / -1;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: -6px;
      }
      .entry-tag {
        color: var(--text-3);
        font-size: 12px;
      }

      .empty {
        color: var(--text-3);
        font-size: 15px;
        padding: var(--space-3) 0;
      }
      .empty code {
        font-family: var(--mono);
        font-size: 13px;
        background: var(--surface);
        border: 1px solid var(--rule);
        border-radius: 6px;
        padding: 2px 6px;
      }

      footer.global {
        background: var(--bg-chrome);
        border-top: 1px solid var(--rule-soft);
        color: var(--text-2);
        font-size: 12px;
        line-height: 1.5;
        margin-top: auto;
      }
      footer.global .inner {
        max-width: var(--max-w);
        margin: 0 auto;
        padding: 24px var(--space-3);
        display: flex;
        flex-wrap: wrap;
        gap: 8px 24px;
        align-items: center;
        justify-content: flex-end;
      }
      footer.global a {
        color: var(--text-2);
      }
      footer.global a:hover {
        color: var(--text);
      }
      footer.global .meta {
        color: var(--text-3);
      }

      @media (max-width: 760px) {
        .wrap { padding: 0 var(--space-2); }
        nav.global .inner { padding: 0 var(--space-2); }
        nav.global .brand { font-size: 15px; }
        .brand .html { font-size: 14px; }
        .gallery-layout {
          display: flex;
          flex-direction: column;
          align-items: stretch;
          gap: var(--space-3);
        }
        .entries { width: 100%; }

        /* filters become an off-canvas drawer */
        .filter-trigger {
          display: inline-flex;
          align-items: center;
          gap: 8px;
          align-self: flex-start;
          margin-bottom: var(--space-2);
          padding: 8px 14px;
          border: 1px solid var(--rule);
          border-radius: 999px;
          background: var(--surface);
          color: var(--text-2);
          font: inherit;
          font-size: 14px;
          min-height: 38px;
          cursor: pointer;
        }
        .filter-trigger svg { width: 16px; height: 16px; flex: none; }
        .drawer-backdrop {
          display: block;
          position: fixed;
          inset: 0;
          z-index: 150;
          background: rgba(0, 0, 0, 0.4);
          opacity: 0;
          pointer-events: none;
          transition: opacity 0.2s ease;
        }
        .drawer-backdrop.open { opacity: 1; pointer-events: auto; }
        body[data-drawer="open"] { overflow: hidden; }
        .filters {
          position: fixed;
          top: 0;
          left: 0;
          z-index: 200;
          width: min(84vw, 320px);
          height: 100dvh;
          margin: 0;
          padding: var(--space-3) var(--space-3) var(--space-4);
          background: var(--bg);
          border-right: 1px solid var(--rule);
          overflow-y: auto;
          -webkit-overflow-scrolling: touch;
          transform: translateX(-100%);
          transition: transform 0.25s ease;
        }
        .filters.open {
          transform: translateX(0);
          box-shadow: 0 0 40px rgba(0, 0, 0, 0.22);
        }
        .drawer-head {
          display: flex;
          align-items: center;
          justify-content: space-between;
          margin-bottom: var(--space-3);
        }
        .drawer-head .drawer-title { font-size: 17px; font-weight: 600; }
        .drawer-close {
          border: 0;
          background: transparent;
          color: var(--text-2);
          font-size: 22px;
          line-height: 1;
          cursor: pointer;
          padding: 4px;
          margin: -4px;
        }
        /* show every category/tag as a wrapping chip cloud — no scroll, no toggle */
        .category-list {
          display: flex;
          flex-wrap: wrap;
          gap: 8px;
        }
        .category-button {
          width: auto;
          display: inline-flex;
          gap: 6px;
          min-height: 34px;
          padding: 5px 12px;
          border: 1px solid var(--rule);
          border-radius: 999px;
        }
        .category-button[aria-pressed="true"] {
          border-color: color-mix(in srgb, var(--accent), transparent 68%);
        }
        .tag-list { gap: 8px; }
        .tag-button { min-height: 32px; }
        .gallery-head { width: 100%; }
        ul.list a {
          grid-template-columns: minmax(0, 1fr);
          gap: 4px;
        }
        ul.list .date { font-size: 12px; }
        .entry-tags { margin-top: 0; }
        footer.global .inner { padding: 20px var(--space-2); }
      }
    </style>
  </head>
  <body>
    <nav class="global">
      <div class="inner">
        <a class="brand" id="site-title" href="/" aria-label="Agent <Pages/>">
          <span>Agent</span>
          <span class="sep" aria-hidden="true">·</span>
          <span class="html" aria-hidden="true">
            <span class="bracket">&lt;</span>Pages<span class="bracket">/&gt;</span>
          </span>
        </a>
        <a class="gh" id="gh-link" hidden target="_blank" rel="noopener" aria-label="GitHub repository">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.6 7.6 0 0 1 2-.27c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
        </a>
      </div>
    </nav>

    <div class="drawer-backdrop" id="drawer-backdrop"></div>

    <main class="gallery">
      <div class="wrap gallery-layout">
        <aside class="filters" id="filters" aria-label="筛选">
          <div class="drawer-head">
            <span class="drawer-title">筛选</span>
            <button class="drawer-close" id="drawer-close" type="button" aria-label="关闭筛选">&times;</button>
          </div>
          <section class="filter-section categories" aria-label="分类筛选">
            <h2>Categories</h2>
            <div class="category-list" id="category-list"></div>
          </section>
          <section class="filter-section tags" aria-label="标签筛选">
            <h2>Tags</h2>
            <div class="tag-list" id="tag-list"></div>
          </section>
        </aside>

        <section class="entries" aria-live="polite">
          <button class="filter-trigger" id="filter-trigger" type="button" aria-controls="filters" aria-expanded="false">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path fill="currentColor" d="M1.5 2h13a.5.5 0 0 1 .38.83L10 8.7V13.5a.5.5 0 0 1-.74.44l-2.5-1.37A.5.5 0 0 1 6.5 12.13V8.7L1.12 2.83A.5.5 0 0 1 1.5 2z"/></svg>
            筛选
          </button>
          <div class="gallery-head">
            <h2 id="active-filter">全部页面</h2>
            <span class="gallery-count" id="gallery-count"></span>
          </div>
          <div id="entries"></div>
          <p class="empty" id="empty">
            可以通过 <code>/agent-pages &lt;主题&gt;</code> Skill 生成页面。
          </p>
        </section>
      </div>
    </main>

    <footer class="global">
      <div class="inner">
        <span class="meta">
          Built with
          <a href="https://github.com/wanggang316/agent-pages" target="_blank" rel="noopener">agent-pages</a>
        </span>
      </div>
    </footer>

    <script>
      const state = {
        data: { entries: [], tags: [] },
        activeCategory: "all",
        activeTag: "all",
      };

      const elements = {
        categories: document.getElementById("category-list"),
        tags: document.getElementById("tag-list"),
        entries: document.getElementById("entries"),
        empty: document.getElementById("empty"),
        activeFilter: document.getElementById("active-filter"),
        count: document.getElementById("gallery-count"),
        siteTitle: document.getElementById("site-title"),
        ghLink: document.getElementById("gh-link"),
        filters: document.getElementById("filters"),
        filterTrigger: document.getElementById("filter-trigger"),
        drawerBackdrop: document.getElementById("drawer-backdrop"),
        drawerClose: document.getElementById("drawer-close"),
      };

      function openDrawer() {
        elements.filters.classList.add("open");
        elements.drawerBackdrop.classList.add("open");
        document.body.dataset.drawer = "open";
        elements.filterTrigger.setAttribute("aria-expanded", "true");
      }

      function closeDrawer() {
        elements.filters.classList.remove("open");
        elements.drawerBackdrop.classList.remove("open");
        delete document.body.dataset.drawer;
        elements.filterTrigger.setAttribute("aria-expanded", "false");
      }

      const collator = new Intl.Collator("zh-CN", { numeric: true, sensitivity: "base" });

      function normalizeTag(tag) {
        return String(tag || "").trim();
      }

      function tagLabel(tag) {
        if (typeof tag === "string") return tag;
        return tag && tag.label ? tag.label : "";
      }

      function tagSlug(tag) {
        if (typeof tag === "string") return tag;
        return tag && tag.slug ? tag.slug : tagLabel(tag);
      }

      function getEntryTags(entry) {
        return Array.isArray(entry.tags) ? entry.tags.map(normalizeTag).filter(Boolean) : [];
      }

      function getEntryCategory(entry) {
        return normalizeTag(entry.category) || "other";
      }

      function getCategories(data) {
        const counts = new Map();
        for (const entry of data.entries || []) {
          const category = getEntryCategory(entry);
          counts.set(category, (counts.get(category) || 0) + 1);
        }

        const configured = Array.isArray(data.categories) ? data.categories : [];
        const categories = configured
          .map((category) => ({
            slug: normalizeTag(tagSlug(category)),
            label: normalizeTag(tagLabel(category)),
          }))
          .filter((category) => category.slug && category.label);
        const known = new Set(categories.map((category) => category.slug));

        for (const category of counts.keys()) {
          if (!known.has(category)) {
            categories.push({ slug: category, label: category });
          }
        }

        return categories
          .map((category) => ({ ...category, count: counts.get(category.slug) || 0 }))
          .sort((a, b) => {
            if (a.slug === "other") return 1;
            if (b.slug === "other") return -1;
            return collator.compare(a.label, b.label);
          });
      }

      function getTags(data) {
        const explicitTags = Array.isArray(data.tags) ? data.tags : [];
        if (explicitTags.length > 0) {
          return explicitTags
            .map((tag) => ({
              slug: normalizeTag(tagSlug(tag)),
              label: normalizeTag(tagLabel(tag)),
              count: Number(tag.count || 0),
            }))
            .filter((tag) => tag.slug && tag.label);
        }

        const counts = new Map();
        for (const entry of data.entries || []) {
          for (const tag of getEntryTags(entry)) {
            counts.set(tag, (counts.get(tag) || 0) + 1);
          }
        }
        return [...counts.entries()]
          .map(([tag, count]) => ({ slug: tag, label: tag, count }))
          .sort((a, b) => collator.compare(a.label, b.label));
      }

      function getFilteredEntries() {
        const entries = Array.isArray(state.data.entries) ? state.data.entries : [];
        const filtered = entries.filter((entry) => {
          const categoryMatches = state.activeCategory === "all" || getEntryCategory(entry) === state.activeCategory;
          const tagMatches = state.activeTag === "all" || getEntryTags(entry).includes(state.activeTag);
          return categoryMatches && tagMatches;
        });

        return filtered.slice().sort((a, b) => {
          const byDate = String(b.date || "").localeCompare(String(a.date || ""));
          if (byDate !== 0) return byDate;
          return collator.compare(String(a.title || ""), String(b.title || ""));
        });
      }

      function categorizeByYear(entries) {
        return entries.reduce((years, entry) => {
          const year = String(entry.year || entry.date || "").slice(0, 4) || "Unknown";
          if (!years.has(year)) years.set(year, []);
          years.get(year).push(entry);
          return years;
        }, new Map());
      }

      function renderTags() {
        const baseEntries = Array.isArray(state.data.entries) ? state.data.entries : [];
        const entries = state.activeCategory === "all"
          ? baseEntries
          : baseEntries.filter((entry) => getEntryCategory(entry) === state.activeCategory);
        const tagData = { ...state.data, entries };
        const tags = getTags(tagData);
        const total = entries.length;
        const allTags = [{ slug: "all", label: "全部", count: total }, ...tags];

        elements.tags.replaceChildren(...allTags.map((tag) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "tag-button";
          button.setAttribute("aria-pressed", String(state.activeTag === tag.slug));
          button.dataset.tag = tag.slug;

          const name = document.createElement("span");
          name.className = "tag-name";
          name.textContent = tag.label;

          const count = document.createElement("span");
          count.className = "tag-count";
          count.textContent = String(tag.count);

          button.append(name, count);
          button.addEventListener("click", () => {
            state.activeTag = tag.slug;
            render();
            closeDrawer();
          });
          return button;
        }));
      }

      function renderCategories() {
        const categories = getCategories(state.data);
        const total = Array.isArray(state.data.entries) ? state.data.entries.length : 0;
        const allCategories = [{ slug: "all", label: "全部", count: total }, ...categories];

        elements.categories.replaceChildren(...allCategories.map((category) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "category-button";
          button.setAttribute("aria-pressed", String(state.activeCategory === category.slug));
          button.dataset.category = category.slug;

          const name = document.createElement("span");
          name.className = "category-name";
          name.textContent = category.label;

          const count = document.createElement("span");
          count.className = "category-count";
          count.textContent = String(category.count);

          button.append(name, count);
          button.addEventListener("click", () => {
            state.activeCategory = category.slug;
            state.activeTag = "all";
            render();
            closeDrawer();
          });
          return button;
        }));
      }

      function repoLink(raw) {
        const s = normalizeTag(raw);
        if (!s) return null;
        let m = s.match(/github\.com[/:]([^/]+\/[^/]+?)(?:\.git)?\/?$/i);
        if (m) return { href: "https://github.com/" + m[1], label: m[1] };
        m = s.match(/^([\w.-]+\/[\w.-]+?)(?:\.git)?$/);
        if (m) return { href: "https://github.com/" + m[1], label: m[1] };
        if (/^https?:\/\//i.test(s)) return { href: s, label: "GitHub" };
        return null;
      }

      function splitSiteTitle(title) {
        const value = normalizeTag(title) || "Agent <Pages/>";
        const codeStart = value.lastIndexOf("<");
        if (codeStart < 0 || !value.endsWith("/>")) return { name: value, code: "" };
        const name = normalizeTag(value.slice(0, codeStart)) || "Agent";
        const code = value.slice(codeStart);
        if (code.indexOf(">") !== code.length - 1 || code.includes("</")) {
          return { name: value, code: "" };
        }
        return { name, code };
      }

      function renderSiteMeta() {
        const site = state.data && typeof state.data.site === "object" ? state.data.site : {};
        const title = normalizeTag(site.title) || "Agent <Pages/>";
        const parts = splitSiteTitle(title);

        const name = document.createElement("span");
        name.textContent = parts.name;

        const children = [name];
        if (parts.code) {
          const sep = document.createElement("span");
          sep.className = "sep";
          sep.setAttribute("aria-hidden", "true");
          sep.textContent = "·";

          const code = document.createElement("span");
          code.className = "html";
          code.setAttribute("aria-hidden", "true");
          const codeText = parts.code.slice(1, -2);
          code.replaceChildren(
            Object.assign(document.createElement("span"), {
              className: "bracket",
              textContent: "<",
            }),
            document.createTextNode(codeText),
            Object.assign(document.createElement("span"), {
              className: "bracket",
              textContent: "/>",
            }),
          );
          children.push(sep, code);
        }

        elements.siteTitle.replaceChildren(...children);
        elements.siteTitle.setAttribute("aria-label", title);
        document.title = title;

        const link = repoLink(site.repo);
        if (link) {
          elements.ghLink.href = link.href;
          elements.ghLink.hidden = false;
        } else {
          elements.ghLink.hidden = true;
        }
      }

      function renderEntries() {
        const entries = getFilteredEntries();
        const years = categorizeByYear(entries);
        const fragment = document.createDocumentFragment();

        for (const [year, yearEntries] of years) {
          const section = document.createElement("section");
          section.className = "year";
          section.dataset.year = year;

          const heading = document.createElement("h3");
          heading.textContent = year;
          const rule = document.createElement("span");
          rule.className = "rule";
          rule.setAttribute("aria-hidden", "true");
          section.append(heading, rule);
          fragment.append(section);

          const list = document.createElement("ul");
          list.className = "list";
          list.dataset.year = year;

          for (const entry of yearEntries) {
            const item = document.createElement("li");
            const link = document.createElement("a");
            link.href = entry.href || "#";

            const title = document.createElement("span");
            title.className = "title";
            title.textContent = entry.title || "Untitled";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = entry.date || "";

            link.append(title, date);

            const tags = getEntryTags(entry);
            if (tags.length > 0) {
              const tagWrap = document.createElement("span");
              tagWrap.className = "entry-tags";
              for (const tag of tags) {
                const label = document.createElement("span");
                label.className = "entry-tag";
                label.textContent = `#${tag}`;
                tagWrap.append(label);
              }
              link.append(tagWrap);
            }

            item.append(link);
            list.append(item);
          }
          fragment.append(list);
        }

        elements.entries.replaceChildren(fragment);
        elements.empty.hidden = entries.length > 0;
        elements.count.textContent = `${entries.length} / ${(state.data.entries || []).length}`;

        const active = getTags(state.data).find((tag) => tag.slug === state.activeTag);
        const activeCategory = getCategories(state.data).find((category) => category.slug === state.activeCategory);
        const categoryLabel = state.activeCategory === "all" ? "全部分类" : `分类：${activeCategory ? activeCategory.label : state.activeCategory}`;
        const tagLabel = state.activeTag === "all" ? "" : ` / 标签：${active ? active.label : state.activeTag}`;
        elements.activeFilter.textContent = `${categoryLabel}${tagLabel}`;
      }

      function render() {
        renderSiteMeta();
        renderCategories();
        renderTags();
        renderEntries();
      }

      async function loadGallery() {
        try {
          const response = await fetch("./data.json", { cache: "no-cache" });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          state.data = await response.json();
        } catch (error) {
          state.data = { entries: [], tags: [] };
          elements.empty.replaceChildren(
            document.createTextNode("可以通过 "),
            Object.assign(document.createElement("code"), { textContent: "/agent-pages <主题>" }),
            document.createTextNode(" Skill 生成页面。"),
          );
        }
        render();
      }

      elements.filterTrigger.addEventListener("click", openDrawer);
      elements.drawerBackdrop.addEventListener("click", closeDrawer);
      elements.drawerClose.addEventListener("click", closeDrawer);
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") closeDrawer();
      });

      loadGallery();
    </script>
  </body>
</html>
