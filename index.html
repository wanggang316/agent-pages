<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- Customize gallery metadata in gallery.json. -->
    <title>Agent &lt;Pages/&gt;</title>
    <meta name="description" content="agent-pages gallery." />
    <link rel="icon" href="data:," />
    <style>
      :root {
        --bg: #fbfbfd;
        --bg-chrome: #f5f5f7;
        --surface: #ffffff;
        --text: #1d1d1f;
        --text-2: #565659;
        --text-3: #86868b;
        --rule: #e6e6eb;
        --rule-soft: #e8e8ed;
        --accent: #2563eb;
        --accent-soft: #eaf1ff;
        --max-w: 1040px;
        --space-1: 8px;
        --space-2: 16px;
        --space-3: 24px;
        --space-4: 40px;
        --space-5: 64px;
        --nav-h: 52px;
        --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei", Roboto, Helvetica, Arial,
          sans-serif;
        --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #000000;
          --bg-chrome: #0d0d0f;
          --surface: #0d0d0f;
          --text: #f5f5f7;
          --text-2: #c7c7cc;
          --text-3: #8a8a8f;
          --rule: #1f1f24;
          --rule-soft: #1a1a1f;
          --accent: #5b8cff;
          --accent-soft: #10203d;
        }
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
        font-size: 17px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
      }
      a { color: inherit; text-decoration: none; }
      .wrap { width: 100%; max-width: var(--max-w); margin: 0 auto; padding: 0 var(--space-3); }

      nav.global {
        position: sticky;
        top: 0;
        z-index: 100;
        height: var(--nav-h);
        background: color-mix(in srgb, var(--bg-chrome), transparent 18%);
        backdrop-filter: saturate(180%) blur(20px);
        -webkit-backdrop-filter: saturate(180%) blur(20px);
        border-bottom: 1px solid var(--rule-soft);
      }
      nav.global .inner {
        width: 100%;
        max-width: var(--max-w);
        height: 100%;
        margin: 0 auto;
        padding: 0 var(--space-3);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--space-2);
      }
      nav.global .brand {
        color: var(--text);
        font-size: 17px;
        font-weight: 500;
        letter-spacing: -0.022em;
        line-height: 1;
      }
      .brand {
        display: inline-flex;
        align-items: baseline;
        flex-wrap: nowrap;
        gap: 6px;
      }
      .brand .sep {
        color: var(--text-3);
        font-weight: 400;
        margin: 0 2px;
      }
      .brand .html {
        font-family: var(--mono);
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0;
        background: linear-gradient(
          92deg,
          #ff6a3d 0%,
          #ff2d55 28%,
          #af52de 58%,
          #007aff 100%
        );
        background-size: 200% 100%;
        background-position: 0% 50%;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .brand .html .bracket {
        color: var(--text-3);
        -webkit-text-fill-color: var(--text-3);
        font-weight: 400;
      }
      main.gallery { flex: 1; padding: var(--space-4) 0 var(--space-5); }
      .gallery-layout {
        display: grid;
        grid-template-columns: 188px minmax(0, 1fr);
        gap: var(--space-4);
        align-items: start;
      }

      .filters {
        position: sticky;
        top: calc(var(--nav-h) + var(--space-3));
        padding-right: var(--space-2);
      }
      .filter-section + .filter-section {
        margin-top: var(--space-3);
      }
      .filters h2 {
        margin: 0 0 10px;
        color: var(--text-3);
        font-size: 12px;
        font-weight: 650;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .categories {
        --category-list-max-h: 150px;
      }
      .category-list {
        display: grid;
        gap: 4px;
        max-height: none;
        overflow: hidden;
      }
      .categories[data-expanded="false"] .category-list { max-height: var(--category-list-max-h); }
      .category-button {
        min-width: 0;
        width: 100%;
        min-height: 30px;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: var(--text-2);
        cursor: pointer;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 8px;
        padding: 4px 6px;
        font: inherit;
        font-size: 12px;
        line-height: 1.35;
        text-align: left;
      }
      .category-button:hover {
        background: var(--surface);
        color: var(--text);
      }
      .category-button[aria-pressed="true"] {
        background: var(--accent-soft);
        color: var(--accent);
      }
      .category-name {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .category-count {
        color: var(--text-3);
        font-family: var(--mono);
        font-size: 11px;
        font-variant-numeric: tabular-nums;
      }
      .category-toggle,
      .tag-toggle {
        display: none;
        margin-top: 10px;
        min-height: 28px;
        border: 0;
        background: transparent;
        color: var(--accent);
        cursor: pointer;
        font: inherit;
        font-size: 12px;
        padding: 0;
      }
      .categories[data-overflow="true"] .category-toggle { display: inline-flex; }
      .tags {
        --tag-list-max-h: 116px;
      }
      .tag-list {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        max-height: none;
        overflow: hidden;
      }
      .tags[data-expanded="false"] .tag-list { max-height: var(--tag-list-max-h); }
      .tag-button {
        min-width: 0;
        max-width: 100%;
        min-height: 28px;
        border: 1px solid var(--rule);
        border-radius: 999px;
        background: transparent;
        color: var(--text-2);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 3px 8px;
        font: inherit;
        font-size: 12px;
        line-height: 1.35;
        text-align: center;
        transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
      }
      .tag-button:hover {
        background: var(--surface);
        border-color: var(--rule);
        color: var(--text);
      }
      .tag-button[aria-pressed="true"] {
        background: var(--accent-soft);
        border-color: color-mix(in srgb, var(--accent), transparent 68%);
        color: var(--accent);
      }
      .tag-name {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .tag-count {
        flex: none;
        color: var(--text-3);
        font-family: var(--mono);
        font-size: 11px;
        font-variant-numeric: tabular-nums;
      }
      .tags[data-overflow="true"] .tag-toggle { display: inline-flex; }

      .gallery-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: var(--space-2);
        min-height: 28px;
      }
      .gallery-head h2 {
        margin: 0;
        font-size: 15px;
        font-weight: 600;
        color: var(--text-2);
      }
      .gallery-count {
        color: var(--text-3);
        font-family: var(--mono);
        font-size: 12px;
        font-variant-numeric: tabular-nums;
      }

      section.year {
        display: flex;
        align-items: baseline;
        gap: var(--space-2);
        margin: var(--space-4) 0 var(--space-2);
      }
      section.year:first-of-type { margin-top: var(--space-3); }
      section.year h3 {
        margin: 0;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.04em;
        color: var(--text-3);
        font-variant-numeric: tabular-nums;
      }
      section.year .rule { flex: 1; height: 1px; background: var(--rule); }

      ul.list { list-style: none; margin: 0; padding: 0; }
      ul.list li { border-bottom: 1px solid var(--rule); }
      ul.list a {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: baseline;
        gap: var(--space-3);
        padding: var(--space-2) 0;
        min-height: 44px;
        transition: color 0.15s ease;
      }
      ul.list a:hover { color: var(--accent); }
      ul.list .title {
        min-width: 0;
        font-size: 17px;
        font-weight: 450;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      ul.list .date {
        flex: none;
        color: var(--text-3);
        font-family: var(--mono);
        font-size: 13px;
        font-variant-numeric: tabular-nums;
      }
      .entry-tags {
        grid-column: 1 / -1;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: -6px;
      }
      .entry-tag {
        color: var(--text-3);
        font-size: 12px;
      }

      .empty {
        color: var(--text-3);
        font-size: 15px;
        padding: var(--space-3) 0;
      }
      .empty code {
        font-family: var(--mono);
        font-size: 13px;
        background: var(--surface);
        border: 1px solid var(--rule);
        border-radius: 6px;
        padding: 2px 6px;
      }

      footer.global {
        background: var(--bg-chrome);
        border-top: 1px solid var(--rule-soft);
        color: var(--text-2);
        font-size: 12px;
        line-height: 1.5;
        margin-top: auto;
      }
      footer.global .inner {
        max-width: var(--max-w);
        margin: 0 auto;
        padding: 24px var(--space-3);
        display: flex;
        flex-wrap: wrap;
        gap: 8px 24px;
        align-items: center;
        justify-content: flex-end;
      }
      footer.global a {
        color: var(--text-2);
      }
      footer.global a:hover {
        color: var(--text);
      }
      footer.global .meta {
        color: var(--text-3);
      }

      @media (max-width: 760px) {
        .wrap { padding: 0 var(--space-2); }
        nav.global .inner { padding: 0 var(--space-2); }
        nav.global .brand { font-size: 15px; }
        .brand .html { font-size: 14px; }
        .gallery-layout {
          display: flex;
          flex-direction: column;
          align-items: stretch;
          gap: var(--space-3);
        }
        .entries { width: 100%; }
        .filters {
          position: static;
          width: 100%;
          padding-right: 0;
          padding-bottom: var(--space-2);
          border-bottom: 1px solid var(--rule);
        }
        .categories { --category-list-max-h: 110px; }
        .tags { --tag-list-max-h: 78px; }
        .tag-list {
          gap: 6px;
          padding-bottom: 2px;
        }
        .tag-button {
          min-height: 30px;
        }
        .gallery-head {
          width: 100%;
        }
        ul.list a {
          grid-template-columns: minmax(0, 1fr);
          gap: 4px;
        }
        ul.list .date {
          font-size: 12px;
        }
        .entry-tags {
          margin-top: 0;
        }
        footer.global .inner {
          padding: 20px var(--space-2);
        }
      }
    </style>
  </head>
  <body>
    <nav class="global">
      <div class="inner">
        <a class="brand" id="site-title" href="/" aria-label="Agent <Pages/>">
          <span>Agent</span>
          <span class="sep" aria-hidden="true">·</span>
          <span class="html" aria-hidden="true">
            <span class="bracket">&lt;</span>Pages<span class="bracket">/&gt;</span>
          </span>
        </a>
      </div>
    </nav>

    <main class="gallery">
      <div class="wrap gallery-layout">
        <aside class="filters" aria-label="筛选">
          <section class="filter-section categories" aria-label="分类筛选">
            <h2>Categories</h2>
            <div class="category-list" id="category-list"></div>
            <button class="category-toggle" id="category-toggle" type="button" aria-expanded="false">
              展开
            </button>
          </section>
          <section class="filter-section tags" aria-label="标签筛选">
            <h2>Tags</h2>
            <div class="tag-list" id="tag-list"></div>
            <button class="tag-toggle" id="tag-toggle" type="button" aria-expanded="false">
              展开
            </button>
          </section>
        </aside>

        <section class="entries" aria-live="polite">
          <div class="gallery-head">
            <h2 id="active-filter">全部页面</h2>
            <span class="gallery-count" id="gallery-count"></span>
          </div>
          <div id="entries"></div>
          <p class="empty" id="empty">
            可以通过 <code>/agent-pages &lt;主题&gt;</code> Skill 生成页面。
          </p>
        </section>
      </div>
    </main>

    <footer class="global">
      <div class="inner">
        <span class="meta">
          Built with
          <a href="https://github.com/wanggang316/agent-pages" target="_blank" rel="noopener">agent-pages</a>
        </span>
      </div>
    </footer>

    <script>
      const state = {
        data: { entries: [], tags: [] },
        activeCategory: "all",
        activeTag: "all",
        categoriesExpanded: false,
        tagsExpanded: false,
      };

      const elements = {
        categoryPanel: document.querySelector(".categories"),
        categories: document.getElementById("category-list"),
        categoryToggle: document.getElementById("category-toggle"),
        tagPanel: document.querySelector(".tags"),
        tags: document.getElementById("tag-list"),
        tagToggle: document.getElementById("tag-toggle"),
        entries: document.getElementById("entries"),
        empty: document.getElementById("empty"),
        activeFilter: document.getElementById("active-filter"),
        count: document.getElementById("gallery-count"),
        siteTitle: document.getElementById("site-title"),
      };

      const collator = new Intl.Collator("zh-CN", { numeric: true, sensitivity: "base" });

      function normalizeTag(tag) {
        return String(tag || "").trim();
      }

      function tagLabel(tag) {
        if (typeof tag === "string") return tag;
        return tag && tag.label ? tag.label : "";
      }

      function tagSlug(tag) {
        if (typeof tag === "string") return tag;
        return tag && tag.slug ? tag.slug : tagLabel(tag);
      }

      function getEntryTags(entry) {
        return Array.isArray(entry.tags) ? entry.tags.map(normalizeTag).filter(Boolean) : [];
      }

      function getEntryCategory(entry) {
        const href = String(entry.href || "").replace(/^\.?\//, "");
        const slash = href.lastIndexOf("/");
        if (slash > 0) return href.slice(0, slash);
        return normalizeTag(entry.project) || "root";
      }

      function getCategories(data) {
        const counts = new Map();
        for (const entry of data.entries || []) {
          const category = getEntryCategory(entry);
          counts.set(category, (counts.get(category) || 0) + 1);
        }
        return [...counts.entries()]
          .map(([category, count]) => ({ slug: category, label: category, count }))
          .sort((a, b) => collator.compare(a.label, b.label));
      }

      function getTags(data) {
        const explicitTags = Array.isArray(data.tags) ? data.tags : [];
        if (explicitTags.length > 0) {
          return explicitTags
            .map((tag) => ({
              slug: normalizeTag(tagSlug(tag)),
              label: normalizeTag(tagLabel(tag)),
              count: Number(tag.count || 0),
            }))
            .filter((tag) => tag.slug && tag.label);
        }

        const counts = new Map();
        for (const entry of data.entries || []) {
          for (const tag of getEntryTags(entry)) {
            counts.set(tag, (counts.get(tag) || 0) + 1);
          }
        }
        return [...counts.entries()]
          .map(([tag, count]) => ({ slug: tag, label: tag, count }))
          .sort((a, b) => collator.compare(a.label, b.label));
      }

      function getFilteredEntries() {
        const entries = Array.isArray(state.data.entries) ? state.data.entries : [];
        const filtered = entries.filter((entry) => {
          const categoryMatches = state.activeCategory === "all" || getEntryCategory(entry) === state.activeCategory;
          const tagMatches = state.activeTag === "all" || getEntryTags(entry).includes(state.activeTag);
          return categoryMatches && tagMatches;
        });

        return filtered.slice().sort((a, b) => {
          const byDate = String(b.date || "").localeCompare(String(a.date || ""));
          if (byDate !== 0) return byDate;
          return collator.compare(String(a.title || ""), String(b.title || ""));
        });
      }

      function categorizeByYear(entries) {
        return entries.reduce((years, entry) => {
          const year = String(entry.year || entry.date || "").slice(0, 4) || "Unknown";
          if (!years.has(year)) years.set(year, []);
          years.get(year).push(entry);
          return years;
        }, new Map());
      }

      function renderTags() {
        const baseEntries = Array.isArray(state.data.entries) ? state.data.entries : [];
        const entries = state.activeCategory === "all"
          ? baseEntries
          : baseEntries.filter((entry) => getEntryCategory(entry) === state.activeCategory);
        const tagData = { ...state.data, entries };
        const tags = getTags(tagData);
        const total = entries.length;
        const allTags = [{ slug: "all", label: "全部", count: total }, ...tags];

        elements.tagPanel.dataset.expanded = String(state.tagsExpanded);
        elements.tagToggle.textContent = state.tagsExpanded ? "收起" : "展开";
        elements.tagToggle.setAttribute("aria-expanded", String(state.tagsExpanded));

        elements.tags.replaceChildren(...allTags.map((tag) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "tag-button";
          button.setAttribute("aria-pressed", String(state.activeTag === tag.slug));
          button.dataset.tag = tag.slug;

          const name = document.createElement("span");
          name.className = "tag-name";
          name.textContent = tag.label;

          const count = document.createElement("span");
          count.className = "tag-count";
          count.textContent = String(tag.count);

          button.append(name, count);
          button.addEventListener("click", () => {
            state.activeTag = tag.slug;
            render();
          });
          return button;
        }));
        requestAnimationFrame(updateTagOverflow);
      }

      function renderCategories() {
        const categories = getCategories(state.data);
        const total = Array.isArray(state.data.entries) ? state.data.entries.length : 0;
        const allCategories = [{ slug: "all", label: "全部", count: total }, ...categories];

        elements.categoryPanel.dataset.expanded = String(state.categoriesExpanded);
        elements.categoryToggle.textContent = state.categoriesExpanded ? "收起" : "展开";
        elements.categoryToggle.setAttribute("aria-expanded", String(state.categoriesExpanded));

        elements.categories.replaceChildren(...allCategories.map((category) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "category-button";
          button.setAttribute("aria-pressed", String(state.activeCategory === category.slug));
          button.dataset.category = category.slug;

          const name = document.createElement("span");
          name.className = "category-name";
          name.textContent = category.label;

          const count = document.createElement("span");
          count.className = "category-count";
          count.textContent = String(category.count);

          button.append(name, count);
          button.addEventListener("click", () => {
            state.activeCategory = category.slug;
            state.activeTag = "all";
            render();
          });
          return button;
        }));
        requestAnimationFrame(updateCategoryOverflow);
      }

      function updateCategoryOverflow() {
        const wasExpanded = elements.categoryPanel.dataset.expanded;
        elements.categoryPanel.dataset.expanded = "false";
        const hasOverflow = elements.categories.scrollHeight > elements.categories.clientHeight + 1;
        elements.categoryPanel.dataset.overflow = String(hasOverflow);
        elements.categoryPanel.dataset.expanded = wasExpanded;
      }

      function updateTagOverflow() {
        const wasExpanded = elements.tagPanel.dataset.expanded;
        elements.tagPanel.dataset.expanded = "false";
        const hasOverflow = elements.tags.scrollHeight > elements.tags.clientHeight + 1;
        elements.tagPanel.dataset.overflow = String(hasOverflow);
        elements.tagPanel.dataset.expanded = wasExpanded;
      }

      function splitSiteTitle(title) {
        const value = normalizeTag(title) || "Agent <Pages/>";
        const codeStart = value.lastIndexOf("<");
        if (codeStart < 0 || !value.endsWith("/>")) return { name: value, code: "" };
        const name = normalizeTag(value.slice(0, codeStart)) || "Agent";
        const code = value.slice(codeStart);
        if (code.indexOf(">") !== code.length - 1 || code.includes("</")) {
          return { name: value, code: "" };
        }
        return { name, code };
      }

      function renderSiteMeta() {
        const site = state.data && typeof state.data.site === "object" ? state.data.site : {};
        const title = normalizeTag(site.title) || "Agent <Pages/>";
        const parts = splitSiteTitle(title);

        const name = document.createElement("span");
        name.textContent = parts.name;

        const children = [name];
        if (parts.code) {
          const sep = document.createElement("span");
          sep.className = "sep";
          sep.setAttribute("aria-hidden", "true");
          sep.textContent = "·";

          const code = document.createElement("span");
          code.className = "html";
          code.setAttribute("aria-hidden", "true");
          const codeText = parts.code.slice(1, -2);
          code.replaceChildren(
            Object.assign(document.createElement("span"), {
              className: "bracket",
              textContent: "<",
            }),
            document.createTextNode(codeText),
            Object.assign(document.createElement("span"), {
              className: "bracket",
              textContent: "/>",
            }),
          );
          children.push(sep, code);
        }

        elements.siteTitle.replaceChildren(...children);
        elements.siteTitle.setAttribute("aria-label", title);
        document.title = title;
      }

      function renderEntries() {
        const entries = getFilteredEntries();
        const years = categorizeByYear(entries);
        const fragment = document.createDocumentFragment();

        for (const [year, yearEntries] of years) {
          const section = document.createElement("section");
          section.className = "year";
          section.dataset.year = year;

          const heading = document.createElement("h3");
          heading.textContent = year;
          const rule = document.createElement("span");
          rule.className = "rule";
          rule.setAttribute("aria-hidden", "true");
          section.append(heading, rule);
          fragment.append(section);

          const list = document.createElement("ul");
          list.className = "list";
          list.dataset.year = year;

          for (const entry of yearEntries) {
            const item = document.createElement("li");
            const link = document.createElement("a");
            link.href = entry.href || "#";

            const title = document.createElement("span");
            title.className = "title";
            title.textContent = entry.title || "Untitled";

            const date = document.createElement("span");
            date.className = "date";
            date.textContent = entry.date || "";

            link.append(title, date);

            const tags = getEntryTags(entry);
            if (tags.length > 0) {
              const tagWrap = document.createElement("span");
              tagWrap.className = "entry-tags";
              for (const tag of tags) {
                const label = document.createElement("span");
                label.className = "entry-tag";
                label.textContent = `#${tag}`;
                tagWrap.append(label);
              }
              link.append(tagWrap);
            }

            item.append(link);
            list.append(item);
          }
          fragment.append(list);
        }

        elements.entries.replaceChildren(fragment);
        elements.empty.hidden = entries.length > 0;
        elements.count.textContent = `${entries.length} / ${(state.data.entries || []).length}`;

        const active = getTags(state.data).find((tag) => tag.slug === state.activeTag);
        const activeCategory = getCategories(state.data).find((category) => category.slug === state.activeCategory);
        const categoryLabel = state.activeCategory === "all" ? "全部分类" : `分类：${activeCategory ? activeCategory.label : state.activeCategory}`;
        const tagLabel = state.activeTag === "all" ? "" : ` / 标签：${active ? active.label : state.activeTag}`;
        elements.activeFilter.textContent = `${categoryLabel}${tagLabel}`;
      }

      function render() {
        renderSiteMeta();
        renderCategories();
        renderTags();
        renderEntries();
      }

      async function loadGallery() {
        try {
          const response = await fetch("./gallery.json", { cache: "no-cache" });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          state.data = await response.json();
        } catch (error) {
          state.data = { entries: [], tags: [] };
          elements.empty.replaceChildren(
            document.createTextNode("可以通过 "),
            Object.assign(document.createElement("code"), { textContent: "/agent-pages <主题>" }),
            document.createTextNode(" Skill 生成页面。"),
          );
        }
        render();
      }

      elements.categoryToggle.addEventListener("click", () => {
        state.categoriesExpanded = !state.categoriesExpanded;
        renderCategories();
      });

      elements.tagToggle.addEventListener("click", () => {
        state.tagsExpanded = !state.tagsExpanded;
        renderTags();
      });

      window.addEventListener("resize", () => {
        requestAnimationFrame(updateCategoryOverflow);
        requestAnimationFrame(updateTagOverflow);
      });

      loadGallery();
    </script>
  </body>
</html>
